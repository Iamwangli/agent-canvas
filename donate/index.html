<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赞助 AgentCanvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 500px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
    p { color: #666; margin-bottom: 32px; font-size: 14px; line-height: 1.6; }
    .qrcodes {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .qrcode {
      text-align: center;
    }
    .qrcode img {
      width: 200px;
      height: 200px;
      border-radius: 12px;
      border: 1px solid #eee;
      object-fit: contain;
    }
    .qrcode label {
      display: block;
      margin-top: 8px;
      font-size: 14px;
      color: #888;
    }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>☕ 赞助 AgentCanvas</h1>
    <p>如果这个项目对你有帮助，欢迎打赏一杯咖啡 ❤️</p>
    <div class="qrcodes">
      <div class="qrcode">
        <img src="./Alipay.jpg" alt="支付宝收款码">
        <label>支付宝</label>
      </div>
      <div class="qrcode">
        <img src="./WechatPay.png" alt="微信收款码">
        <label>微信</label>
      </div>
    </div>
    <div class="footer">感谢你的支持 🙏</div>
  </div>
</body>
</html>
